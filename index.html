<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pedidos - Comercial Cárnico</title>
    <style>
        :root { --primary: #8b0000; --dark: #222; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #eee; color: var(--dark); }
        .overlay { padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px 10px; background: #e0e0e0; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        button.btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-tab-pedidos" onclick="switchTab('pedidos')">🛒 Pedido</button>
            <button class="tab-btn" id="btn-tab-clientes" onclick="switchTab('clientes')">👥 Clientes</button>
            <button class="tab-btn" id="btn-tab-productos" onclick="switchTab('productos')">📦 Productos</button>
        </div>

        <div id="panel-pedidos" class="panel active">
            <h3>🛒 Formulario de Pedido</h3>
            <p>Selecciona cliente y añade cantidades...</p>
        </div>

        <div id="panel-clientes" class="panel">
            <h3>👥 Gestión de Clientes</h3>
            <textarea id="data-cli" placeholder="Nombre,Dirección"></textarea>
            <button class="btn btn-green" onclick="guardar('clientes')">💾 Guardar Clientes</button>
            <button class="btn btn-red" onclick="borrarTodo('clientes')">🗑️ BORRAR TODOS LOS CLIENTES</button>
            <table id="tabla-clientes"><thead><tr><th>Cliente</th><th>Dirección</th></tr></thead><tbody></tbody></table>
        </div>

        <div id="panel-productos" class="panel">
            <h3>📦 Catálogo de Productos</h3>
            <textarea id="data-prod" placeholder="Nombre,Formato,Precio"></textarea>
            <button class="btn btn-green" onclick="guardar('productos')">💾 Guardar Productos</button>
            <button class="btn btn-red" onclick="borrarTodo('productos')">🗑️ BORRAR TODOS LOS PRODUCTOS</button>
            <table id="tabla-productos"><thead><tr><th>Producto</th><th>Precio</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        document.getElementById(`btn-tab-${tabId}`).classList.add('active');
        document.getElementById(`panel-${tabId}`).classList.add('active');
    }

    function guardar(key) {
        const id = (key === 'productos') ? 'data-prod' : 'data-cli';
        localStorage.setItem(key, document.getElementById(id).value);
        alert("Datos guardados.");
    }

    function borrarTodo(key) {
        if(confirm("¿Seguro que quieres borrar todos los datos de " + key + "?")) {
            localStorage.removeItem(key);
            document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value = "";
            alert("Borrado realizado.");
            location.reload(); // Recarga para limpiar la tabla
        }
    }

    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('productos') || "";
        document.getElementById('data-cli').value = localStorage.getItem('clientes') || "";
    };
</script>
</body>
</html>
