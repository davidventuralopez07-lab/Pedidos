<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Comercial Cárnica</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .tab-btn { padding: 10px; cursor: pointer; border: none; background: #ddd; margin-right: 5px; border-radius: 5px; }
        .tab-btn.active { background: #8b0000; color: white; }
        .panel { display: none; } .panel.active { display: block; }
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-top: 5px; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn-blue { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h2>🥩 Gestión Comercial</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="show('pedidos')">🛒 Pedidos</button>
        <button class="tab-btn" onclick="show('clientes')">👥 Clientes</button>
        <button class="tab-btn" onclick="show('productos')">📦 Productos</button>
    </div>

    <div id="panel-pedidos" class="panel active">
        <h3>Panel de Pedidos</h3>
        <button class="btn btn-blue" onclick="window.print()">🖨️ Imprimir Pedido</button>
    </div>

    <div id="panel-clientes" class="panel">
        <h3>Gestión de Clientes</h3>
        <textarea id="data-cli" placeholder="Nombre,Dirección"></textarea>
        <button class="btn btn-green" onclick="guardar('clientes')">💾 Guardar</button>
        <button class="btn btn-red" onclick="borrar('clientes')">🗑️ BORRAR TODOS LOS CLIENTES</button>
    </div>

    <div id="panel-productos" class="panel">
        <h3>Gestión de Productos</h3>
        <textarea id="data-prod" placeholder="Nombre,Formato,Precio,Peso"></textarea>
        <button class="btn btn-green" onclick="guardar('productos')">💾 Guardar</button>
        <button class="btn btn-red" onclick="borrar('productos')">🗑️ BORRAR TODOS LOS PRODUCTOS</button>
    </div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-'+id).classList.add('active');
        event.target.classList.add('active');
    }

    function guardar(key) {
        const id = (key === 'productos') ? 'data-prod' : 'data-cli';
        localStorage.setItem(key, document.getElementById(id).value);
        alert("Guardado correctamente.");
    }

    function borrar(key) {
        if(confirm("¿Estás SEGURO de que quieres borrar toda la base de datos?")) {
            localStorage.removeItem(key);
            document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value = "";
            alert("Borrado realizado.");
        }
    }

    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('productos') || "";
        document.getElementById('data-cli').value = localStorage.getItem('clientes') || "";
    };
</script>
</body>
</html>
