
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión Comercial - VENTURA</title>

<style>
:root{
    --primario:#2c3e50;
    --secundario:#16a085;
    --fondo:#ecf0f1;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--fondo);
}

header{
    background:var(--primario);
    color:white;
    padding:15px;
}

header h1{
    margin:0;
}

nav{
    display:flex;
    gap:10px;
    margin-top:10px;
}

nav button{
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

.panel{
    display:none;
    background:white;
    padding:20px;
    border-radius:10px;
}

.panel.active{
    display:block;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

.btn{
    background:var(--secundario);
    color:white;
    border:none;
}

.btn-danger{
    background:#c0392b;
    color:white;
    border:none;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
}

.total{
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>
<body>

<header>
<h1>VENTURA</h1>

<nav>
<button onclick="mostrar('pedidos')">Pedidos</button>
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('productos')">Productos</button>
</nav>
</header>

<div class="container">

<!-- CLIENTES -->

<div id="clientes" class="panel">

<h2>Clientes</h2>

<input id="clienteNombre" placeholder="Nombre">
<input id="clienteDireccion" placeholder="Dirección">

<button class="btn" onclick="agregarCliente()">
Guardar Cliente
</button>

<button class="btn-danger" onclick="borrarClientes()">
Borrar Todos
</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Dirección</th>
<th></th>
</tr>
</thead>
<tbody id="tablaClientes"></tbody>
</table>

</div>

<!-- PRODUCTOS -->

<div id="productos" class="panel">

<h2>Productos</h2>

<input id="productoNombre" placeholder="Nombre producto">

<input
id="productoPrecio"
type="number"
placeholder="Precio por Kg">

<button class="btn" onclick="agregarProducto()">
Guardar Producto
</button>

<button class="btn-danger" onclick="borrarProductos()">
Borrar Todos
</button>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Precio Kg</th>
<th></th>
</tr>
</thead>
<tbody id="tablaProductos"></tbody>
</table>

</div>

<!-- PEDIDOS -->

<div id="pedidos" class="panel active">

<h2>Pedidos</h2>

<input type="date" id="pedidoFecha">

<select id="pedidoCliente"></select>

<select id="pedidoProducto"></select>

<input
type="number"
id="pedidoKg"
placeholder="Kilos">

<button class="btn" onclick="agregarLineaPedido()">
Añadir Producto
</button>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Kg</th>
<th>Precio</th>
<th>Subtotal</th>
</tr>
</thead>

<tbody id="lineasPedido"></tbody>

</table>

<div class="total">
Total: <span id="totalPedido">0</span> €
</div>

<br>

<button class="btn" onclick="guardarPedido()">
Guardar Pedido
</button>

<h3>Pedidos Guardados</h3>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Cliente</th>
<th>Total</th>
<th></th>
</tr>
</thead>

<tbody id="tablaPedidos"></tbody>

</table>

</div>

</div>

<script>

let clientes =
JSON.parse(localStorage.getItem("clientes")) || [];

let productos =
JSON.parse(localStorage.getItem("productos")) || [];

let pedidos =
JSON.parse(localStorage.getItem("pedidos")) || [];

let pedidoActual = [];

function guardarTodo(){
localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);

localStorage.setItem(
"productos",
JSON.stringify(productos)
);

localStorage.setItem(
"pedidos",
JSON.stringify(pedidos)
);
}

function mostrar(id){

document
.querySelectorAll(".panel")
.forEach(p=>p.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");
}

function agregarCliente(){

const nombre =
document.getElementById("clienteNombre").value;

const direccion =
document.getElementById("clienteDireccion").value;

if(!nombre || !direccion) return;

clientes.push({
nombre,
direccion
});

guardarTodo();
renderClientes();

document.getElementById("clienteNombre").value="";
document.getElementById("clienteDireccion").value="";
}

function renderClientes(){

const tabla =
document.getElementById("tablaClientes");

tabla.innerHTML="";

clientes.forEach((c,i)=>{

tabla.innerHTML+=`
<tr>
<td>${c.nombre}</td>
<td>${c.direccion}</td>
<td>
<button class="btn-danger"
onclick="eliminarCliente(${i})">
X
</button>
</td>
</tr>
`;
});

actualizarSelectClientes();
}

function eliminarCliente(i){

clientes.splice(i,1);

guardarTodo();
renderClientes();
}

function borrarClientes(){

if(!confirm("Borrar todos?")) return;

clientes=[];

guardarTodo();
renderClientes();
}

function agregarProducto(){

const nombre =
document.getElementById("productoNombre").value;

const precio =
parseFloat(
document.getElementById("productoPrecio").value
);

if(!nombre || !precio) return;

productos.push({
nombre,
precio
});

guardarTodo();
renderProductos();

document.getElementById("productoNombre").value="";
document.getElementById("productoPrecio").value="";
}

function renderProductos(){

const tabla =
document.getElementById("tablaProductos");

tabla.innerHTML="";

productos.forEach((p,i)=>{

tabla.innerHTML+=`
<tr>
<td>${p.nombre}</td>
<td>${p.precio} €</td>
<td>
<button class="btn-danger"
onclick="eliminarProducto(${i})">
X
</button>
</td>
</tr>
`;
});

actualizarSelectProductos();
}

function eliminarProducto(i){

productos.splice(i,1);

guardarTodo();
renderProductos();
}

function borrarProductos(){

if(!confirm("Borrar todos?")) return;

productos=[];

guardarTodo();
renderProductos();
}

function actualizarSelectClientes(){

const s =
document.getElementById("pedidoCliente");

s.innerHTML="";

clientes.forEach((c,i)=>{

s.innerHTML += `
<option value="${i}">
${c.nombre}
</option>
`;
});
}

function actualizarSelectProductos(){

const s =
document.getElementById("pedidoProducto");

s.innerHTML="";

productos.forEach((p,i)=>{

s.innerHTML += `
<option value="${i}">
${p.nombre}
</option>
`;
});
}

function agregarLineaPedido(){

const producto =
productos[
document.getElementById("pedidoProducto").value
];

const kg =
parseFloat(
document.getElementById("pedidoKg").value
);

if(!producto || !kg) return;

pedidoActual.push({
producto:producto.nombre,
precio:producto.precio,
kg,
subtotal:producto.precio*kg
});

renderPedidoActual();
}

function renderPedidoActual(){

const tabla =
document.getElementById("lineasPedido");

tabla.innerHTML="";

let total=0;

pedidoActual.forEach(l=>{

total+=l.subtotal;

tabla.innerHTML+=`
<tr>
<td>${l.producto}</td>
<td>${l.kg}</td>
<td>${l.precio}</td>
<td>${l.subtotal.toFixed(2)}</td>
</tr>
`;
});

document.getElementById("totalPedido")
.textContent = total.toFixed(2);
}

function guardarPedido(){

const fecha =
document.getElementById("pedidoFecha").value;

const cliente =
clientes[
document.getElementById("pedidoCliente").value
];

if(!fecha || !cliente || pedidoActual.length===0){
alert("Completa los datos");
return;
}

const total =
pedidoActual.reduce(
(a,b)=>a+b.subtotal,
0
);

pedidos.push({
fecha,
cliente:cliente.nombre,
lineas:[...pedidoActual],
total
});

pedidoActual=[];

guardarTodo();
renderPedidoActual();
renderPedidos();

alert("Pedido guardado");
}

function renderPedidos(){

const tabla =
document.getElementById("tablaPedidos");

tabla.innerHTML="";

pedidos.forEach((p,i)=>{

tabla.innerHTML+=`
<tr>
<td>${p.fecha}</td>
<td>${p.cliente}</td>
<td>${p.total.toFixed(2)} €</td>
<td>
<button class="btn-danger"
onclick="eliminarPedido(${i})">
X
</button>
</td>
</tr>
`;
});
}

function eliminarPedido(i){

pedidos.splice(i,1);

guardarTodo();
renderPedidos();
}

renderClientes();
renderProductos();
renderPedidos();

</script>

</body>
</html>
