<script>
    // --- IMPORTACIÓN Y GUARDADO DE PRODUCTOS ---
    function procesarImportacionProductos() {
        const texto = document.getElementById('txt-import-productos').value.trim();
        if(!texto) return alert("Pega algo primero.");
        const lineas = texto.split('\n');
        const productos = JSON.parse(localStorage.getItem('productos'));
        let cont = 0;
        lineas.forEach(l => {
            const partes = l.split(',');
            // Formato ahora: Nombre, Unidad, Precio, PesoPorUnidad
            if(partes.length >= 4) {
                productos.push({ 
                    nombre: partes[0].trim(), 
                    unidad: partes[1].trim(), 
                    precio: parseFloat(partes[2].trim()),
                    pesoPorUnidad: parseFloat(partes[3].trim()) // NUEVO: Peso en Kg por cada unidad/caja
                });
                cont++;
            }
        });
        localStorage.setItem('productos', JSON.stringify(productos));
        toggleImportBox('import-productos');
        mostrarProductos();
        alert("Importados " + cont + " productos con su peso definido.");
    }

    // --- CÁLCULO DEL PEDIDO ---
    function guardarPedidoEnCalendario() {
        const fecha = document.getElementById('ped-fecha').value;
        const cliIdx = document.getElementById('ped-cliente').value;
        if(cliIdx === "" || !fecha) return alert("Selecciona fecha y cliente.");
        
        const clientes = JSON.parse(localStorage.getItem('clientes'));
        const productos = JSON.parse(localStorage.getItem('productos'));
        const clienteSel = clientes[cliIdx];
        
        let itemsPedido = [];
        let totalPedido = 0;

        document.querySelectorAll('.product-row').forEach(f => {
            const idx = f.getAttribute('data-index');
            const prod = productos[idx];
            const cantidad = parseFloat(f.querySelector('.ped-cant').value);
            
            if(cantidad > 0) {
                // LÓGICA DE PESO:
                // Si la unidad es "Kilos", peso = 1. Si es "Cajas/Uds", usamos el peso que definiste.
                const pesoTotal = (prod.unidad === "Kilos") ? cantidad : (cantidad * prod.pesoPorUnidad);
                const subtotal = pesoTotal * prod.precio;
                
                totalPedido += subtotal;
                itemsPedido.push({ 
                    nombre: prod.nombre, 
                    unit: prod.unidad, 
                    cantidad: cantidad, 
                    precioUnitario: prod.precio, // Precio por kilo
                    pesoTotalCalculado: pesoTotal,
                    subtotal: subtotal 
                });
            }
        });
        
        // ... (resto del guardado igual)
    }

</script>
