<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pedidos - Comercial Cárnico</title>
    <style>
        :root { --primary: #8b0000; --dark: #222; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #eee; color: var(--dark); }
        .overlay { padding: 20px; }
        header { text-align: center; margin-bottom: 25px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px 10px; background: #e0e0e0; border: none; font-weight: bold; font-size: 15px; cursor: pointer; border-radius: 8px; text-align: center; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        textarea { resize: vertical; font-family: monospace; }
        button.btn-submit { background: #27ae60; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-delete-all { background: #e74c3c !important; margin-top: 15px !important; }
        .btn-import { background: #3498db; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: var(--primary); color: white; }
        .product-row { background: #fdfdfd; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; }
        .product-info { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .product-inputs { display: flex; gap: 10px; align-items: center; }
        .input-inline { flex: 1; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-save-inline { background: #3498db; color: white; margin-left: 5px; }
        .input-table-edit { width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 6px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f2f2f2; padding: 10px; border-radius: 8px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day-name { font-weight: bold; font-size: 12px; color: #666; padding: 5px 0; }
        .calendar-day { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px 2px; cursor: pointer; font-weight: bold; min-height: 45px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .calendar-day.empty { background: #f9f9f9; border: none; cursor: default; }
        .calendar-day.selected { border: 2px solid var(--primary); background: #fff0f0; }
        .badge-pedidos { background: #27ae60; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-top: 3px; }
        .day-btn-nav { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .dia-info-box { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .import-box { background: #f9f9f9; border: 1px dashed #3498db; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .pedido-dia-item { display: flex !important; justify-content: space-between !important; align-items: center !important; border-bottom: 2px solid #ddd !important; padding: 15px 0 !important; }
        .btn-cruz-eliminar { background: #e74c3c !important; color: white !important; border: none !important; padding: 12px 16px !important; border-radius: 8px !important; cursor: pointer !important; }
        @media print { body * { display: none !important; } #seccion-impresion-bloque, #seccion-impresion-bloque * { display: block !important; } #seccion-impresion-bloque { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="overlay">
    <header><h1>🥩 Panel Comercial</h1></header>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="btn-tab-pedidos" onclick="switchTab('pedidos')">🛒 Pedido</button>
            <button class="tab-btn" id="btn-tab-calendario" onclick="switchTab('calendario')">📅 Calendario</button>
            <button class="tab-btn" id="btn-tab-clientes" onclick="switchTab('clientes')">👥 Clientes</button>
            <button class="tab-btn" id="btn-tab-productos" onclick="switchTab('productos')">📦 Productos</button>
        </div>

        <div id="panel-pedidos" class="panel active">
            <div class="form-group"><label>Fecha:</label><input type="date" id="ped-fecha"></div>
            <div class="form-group"><label>Cliente:</label><select id="ped-cliente" onchange="actualizarDireccionPedido()"><option value="">-- Elegir Cliente --</option></select></div>
            <div id="lista-productos-pedido"></div>
            <button class="btn-submit" onclick="guardarPedidoEnCalendario()">💾 Guardar Pedido</button>
        </div>

        <div id="panel-calendario" class="panel">
            <div class="calendar-header">
                <button class="day-btn-nav" onclick="cambiarMes(-1)">◀ Ant</button>
                <h4 id="calendar-mes-ano"></h4>
                <button class="day-btn-nav" onclick="cambiarMes(1)">Sig ▶</button>
            </div>
            <div class="calendar-grid" id="calendar-grid-body"></div>
            <div id="dia-seleccionado-info" class="dia-info-box" style="display: none;">
                <h3 id="info-titulo-fecha"></h3>
                <div id="info-lista-pedidos"></div>
                <button class="btn-submit" style="background:#e67e22;" onclick="generarImpresionNativa()">📄 Imprimir Pedido</button>
            </div>
        </div>

        <div id="panel-clientes" class="panel">
            <button class="btn-submit btn-import" onclick="toggleImportBox('import-clientes')">📥 Importar Clientes</button>
            <div id="import-clientes" class="import-box">
                <textarea id="txt-import-clientes" rows="4" placeholder="Nombre,Dirección"></textarea>
                <button class="btn-submit" onclick="procesarImportacionClientes()">⚡ Cargar</button>
            </div>
            <button class="btn-submit btn-delete-all" onclick="borrarTodo('clientes')">🗑️ Borrar TODOS los Clientes</button>
            <div style="overflow-x:auto;"><table id="tabla-clientes"><thead><tr><th>Cliente</th><th>Dirección</th><th>Acción</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div id="panel-productos" class="panel">
            <button class="btn-submit btn-import" onclick="toggleImportBox('import-productos')">📥 Importar Catálogo</button>
            <div id="import-productos" class="import-box">
                <textarea id="txt-import-productos" rows="4" placeholder="Nombre,Formato,Precio"></textarea>
                <button class="btn-submit" onclick="procesarImportacionProductos()">⚡ Cargar</button>
            </div>
            <button class="btn-submit btn-delete-all" onclick="borrarTodo('productos')">🗑️ Borrar TODOS los Productos</button>
            <div style="overflow-x:auto;"><table id="tabla-productos"><thead><tr><th>Producto</th><th>Formato</th><th>Precio</th><th>Acción</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>
</div>

<div id="seccion-impresion-bloque" style="display: none;"></div>

<script>
    // Inicialización y lógica (la misma de siempre)
    let productos = JSON.parse(localStorage.getItem('productos')) || [];
    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
    let historial = JSON.parse(localStorage.getItem('historial_pedidos')) || [];

    function switchTab(t) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-tab-'+t).classList.add('active');
        document.getElementById('panel-'+t).classList.add('active');
        if(t==='pedidos') cargarDatosEnPedido();
        if(t==='calendario') renderizarCalendarioVisual();
        if(t==='clientes') mostrarClientes();
        if(t==='productos') mostrarProductos();
    }

    function borrarTodo(tipo) {
        if(confirm("¿Estás SEGURO de que quieres borrar TODA la lista de " + tipo + "?")) {
            localStorage.setItem(tipo, JSON.stringify([]));
            location.reload();
        }
    }

    // Funciones de carga, guardado, renderizado (copia las funciones de tu archivo anterior aquí)
    // ... (El resto de tus funciones: procesarImportacion, guardarPedido, etc.)
</script>
</body>
</html>
