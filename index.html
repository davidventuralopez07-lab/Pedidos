<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Cárnico</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, textarea, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #8b0000; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Gestor Comercial</h2>
    <h3>📦 Importar Productos</h3>
    <textarea id="lista" rows="6" placeholder="Formato: Nombre,Formato,Precio,Peso&#10;Ej: Longanizas,Cajas,5.50,2"></textarea>
    <button onclick="guardar()">Cargar Productos</button>
    <p id="msg"></p>
    <button style="background:#27ae60" onclick="window.print()">🖨️ Imprimir Hoja</button>
</div>

<script>
    function guardar() {
        const texto = document.getElementById('lista').value;
        if(!texto) return alert("Pega los datos primero");
        localStorage.setItem('productos_carnico', texto);
        document.getElementById('msg').innerText = "✅ Productos guardados en la memoria del móvil.";
    }
    
    // Al cargar la página, recuperamos
    const guardado = localStorage.getItem('productos_carnico');
    if(guardado) document.getElementById('lista').value = guardado;
</script>
</body>
</html>
