<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Comercial Cárnico</title>
    <style>
        :root { --primary: #8b0000; }
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn-blue { background: #2980b9; }
        textarea { width: 100%; height: 120px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🥩 Gestión Comercial</h2>
    
    <h3>📦 Productos</h3>
    <textarea id="data-prod" placeholder="Nombre,Formato,Precio,Peso"></textarea>
    <button class="btn btn-green" onclick="guardar('productos')">💾 Guardar Productos</button>
    <button class="btn btn-red" onclick="borrar('productos')">🗑️ BORRAR TODOS LOS PRODUCTOS</button>

    <hr>

    <h3>👥 Clientes</h3>
    <textarea id="data-cli" placeholder="Nombre,Dirección"></textarea>
    <button class="btn btn-green" onclick="guardar('clientes')">💾 Guardar Clientes</button>
    <button class="btn btn-red" onclick="borrar('clientes')">🗑️ BORRAR TODOS LOS CLIENTES</button>

    <hr>
    <button class="btn btn-blue" onclick="window.print()">🖨️ Generar Hoja de Pedido</button>
</div>

<script>
    // Al cargar, ponemos lo que hay en memoria
    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('productos') || "";
        document.getElementById('data-cli').value = localStorage.getItem('clientes') || "";
    };

    function guardar(key) {
        const val = document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value;
        localStorage.setItem(key, val);
        alert("¡Datos guardados!");
    }

    function borrar(key) {
        if(confirm("¿Estás SEGURO de borrar toda la base de datos de " + key + "?")) {
            localStorage.removeItem(key);
            document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value = "";
            alert(key + " borrados correctamente.");
        }
    }
</script>
</body>
</html>
