<script>
    // ... (Mantén las variables iniciales igual) ...

    // --- LÓGICA DE PEDIDOS: PRECIO ÚNICO POR PRODUCTO ---
    function guardarPedidoEnCalendario() {
        const fecha = document.getElementById('ped-fecha').value;
        const cliIdx = document.getElementById('ped-cliente').value;
        if(cliIdx === "" || !fecha) return alert("Selecciona fecha y cliente.");
        
        const clientes = JSON.parse(localStorage.getItem('clientes'));
        const productos = JSON.parse(localStorage.getItem('productos'));
        const clienteSel = clientes[cliIdx];
        
        let itemsPedido = [];
        let totalPedido = 0;

        document.querySelectorAll('.product-row').forEach(f => {
            const idx = f.getAttribute('data-index');
            const cant = parseFloat(f.querySelector('.ped-cant').value);
            
            // LÓGICA: El precio se coge siempre del catálogo (precio base)
            const precioBase = productos[idx].precio; 
            
            if(cant > 0) {
                const sub = cant * precioBase;
                totalPedido += sub;
                itemsPedido.push({ 
                    nombre: productos[idx].nombre, 
                    unit: productos[idx].unidad, 
                    cantidad: cant, 
                    precio: precioBase, // Se usa el precio base configurado
                    subtotal: sub 
                });
            }
        });

        if(itemsPedido.length === 0) return alert("Por favor, introduce al menos una cantidad.");
        
        const historial = JSON.parse(localStorage.getItem('historial_pedidos'));
        historial.push({ 
            fecha: fecha, 
            clienteNombre: clienteSel.nombre, 
            clienteDireccion: clienteSel.direccion, 
            items: itemsPedido, 
            total: totalPedido 
        });
        
        localStorage.setItem('historial_pedidos', JSON.stringify(historial));
        alert("Pedido guardado con éxito.");
        cargarDatosEnPedido();
    }

    // --- ACTUALIZACIÓN DE IMPORTACIÓN PARA PRODUCTOS ---
    function procesarImportacionProductos() {
        const texto = document.getElementById('txt-import-productos').value.trim();
        if(!texto) return alert("Pega algo primero.");
        const lineas = texto.split('\n');
        const productos = JSON.parse(localStorage.getItem('productos'));
        let cont = 0;
        lineas.forEach(l => {
            const partes = l.split(',');
            if(partes.length >= 3) {
                const precioNum = parseFloat(partes[2].trim());
                // Importamos manteniendo la unidad (Kilos/Cajas/Uds) pero asumiendo que el precio es por la unidad de referencia
                productos.push({ 
                    nombre: partes[0].trim(), 
                    unidad: partes[1].trim(), 
                    precio: isNaN(precioNum) ? 0 : precioNum 
                });
                cont++;
            }
        });
        localStorage.setItem('productos', JSON.stringify(productos));
        document.getElementById('txt-import-productos').value = '';
        toggleImportBox('import-productos');
        mostrarProductos();
        alert("Importados " + cont + " productos. El precio configurado se aplicará a todas las ventas de este producto.");
    }

    // ... (El resto de funciones como mostrarClientes, mostrarProductos, etc., se quedan igual) ...
</script>
