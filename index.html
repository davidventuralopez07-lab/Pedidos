<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Comercial Cárnica</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 80px; margin: 10px 0; border: 1px solid #ccc; }
        button { width: 100%; padding: 12px; margin-top: 5px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn-blue { background: #2980b9; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>🥩 Gestión Comercial</h2>
    
    <h3>📦 Base de Productos</h3>
    <textarea id="data-prod" placeholder="Nombre,Formato,Precio,Peso"></textarea>
    <button class="btn-green" onclick="guardar('prod', 'data-prod')">💾 Guardar Productos</button>
    <button class="btn-red" onclick="borrar('prod')">🗑️ Borrar Productos</button>

    <hr>

    <h3>👥 Base de Clientes</h3>
    <textarea id="data-cli" placeholder="Nombre,Dirección"></textarea>
    <button class="btn-green" onclick="guardar('cli', 'data-cli')">💾 Guardar Clientes</button>
    <button class="btn-red" onclick="borrar('cli')">🗑️ Borrar Clientes</button>

    <hr>
    
    <h3>🛒 Generar Pedido</h3>
    <button class="btn-blue" onclick="window.print()">🖨️ Imprimir Hoja de Pedido</button>
</div>

<script>
    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('prod') || "";
        document.getElementById('data-cli').value = localStorage.getItem('cli') || "";
    };

    function guardar(key, id) {
        localStorage.setItem(key, document.getElementById(id).value);
        alert("Guardado");
    }

    function borrar(key) {
        if(confirm("¿Borrar?")) {
            localStorage.removeItem(key);
            document.getElementById('data-' + key).value = "";
        }
    }
</script>
</body>
</html>
