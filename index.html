<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos y Clientes</title>
    <style>
        /* Estilos básicos para mantener tu diseño */
        body { font-family: sans-serif; padding: 20px; }
        .menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; background: #ddd; text-decoration: none; color: black; border-radius: 5px; }
        .active { background: #900; color: white; }
        #busqueda { width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; }
        .cliente-item { padding: 8px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <!-- Tu Menú -->
    <div class="menu">
        <a href="#" class="btn active">Pedidos</a>
        <a href="#" class="btn">Clientes</a>
        <a href="#" class="btn">Productos</a>
    </div>

    <h1>Panel de Pedidos</h1>
    
    <!-- BARRA DE BÚSQUEDA AÑADIDA -->
    <input type="text" id="busqueda" onkeyup="filtrarLista()" placeholder="🔍 Buscar cliente...">

    <ul id="listaClientes">
        <li class="cliente-item">INES Mª LECHA BELTRAN, CL MOLINO NUEVO, 3</li>
        <li class="cliente-item">MARIA JESUS RUBIO GRACIA, CL RIO VILLAHERMOSA, 2</li>
        <!-- Añade aquí el resto de tus clientes -->
    </ul>

    <script>
        function filtrarLista() {
            let input = document.getElementById('busqueda').value.toLowerCase();
            let lista = document.getElementById('listaClientes').getElementsByTagName('li');
            for (let i = 0; i < lista.length; i++) {
                let texto = lista[i].innerText.toLowerCase();
                lista[i].style.display = texto.includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
