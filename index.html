<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Cárnico Definitivo</title>
    <style>
        :root { --primary: #8b0000; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .tab-btn { padding: 10px; cursor: pointer; border: none; background: #ddd; margin-right: 5px; border-radius: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        .btn { width: 100%; padding: 12px; margin-top: 5px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-red { background: #e74c3c; }
        .btn-green { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>🥩 Gestión Comercial</h2>
    
    <div class="tab">
        <button class="tab-btn active" onclick="show('productos')">📦 Productos</button>
        <button class="tab-btn" onclick="show('clientes')">👥 Clientes</button>
    </div>

    <div id="panel-productos" class="panel active">
        <h3>Catálogo de Productos</h3>
        <textarea id="data-prod" placeholder="Nombre,Formato,Precio,Peso"></textarea>
        <button class="btn btn-green" onclick="guardar('productos')">💾 Guardar Productos</button>
        <button class="btn btn-red" onclick="borrar('productos')">🗑️ BORRAR TODOS LOS PRODUCTOS</button>
    </div>

    <div id="panel-clientes" class="panel">
        <h3>Lista de Clientes</h3>
        <textarea id="data-cli" placeholder="Nombre,Dirección"></textarea>
        <button class="btn btn-green" onclick="guardar('clientes')">💾 Guardar Clientes</button>
        <button class="btn btn-red" onclick="borrar('clientes')">🗑️ BORRAR TODOS LOS CLIENTES</button>
    </div>
</div>

<script>
    // Al cargar, recuperar los datos
    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('productos') || "";
        document.getElementById('data-cli').value = localStorage.getItem('clientes') || "";
    };

    function show(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-'+id).classList.add('active');
        event.target.classList.add('active');
    }

    function guardar(key) {
        const val = document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value;
        localStorage.setItem(key, val);
        alert("Guardado correctamente.");
    }

    function borrar(key) {
        if(confirm("¿Estás seguro de que quieres BORRAR TODO?")) {
            localStorage.removeItem(key);
            document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value = "";
            alert("Borrado realizado.");
        }
    }
</script>
</body>
</html>
