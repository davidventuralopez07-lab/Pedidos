<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Cárnico</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background: #27ae60; }
        .btn-clear { background: #e74c3c; }
        .btn-print { background: #2980b9; }
    </style>
</head>
<body>

<div class="box">
    <h2>🥩 Gestión Comercial</h2>
    
    <h3>📦 Base de Productos</h3>
    <textarea id="data-prod" placeholder="Formato: Nombre,Formato,Precio,Peso"></textarea>
    <button class="btn-save" onclick="guardar('prod', 'data-prod')">💾 Guardar Productos</button>
    <button class="btn-clear" onclick="borrar('prod')">🗑️ Borrar Todos los Productos</button>

    <hr style="margin: 20px 0;">

    <h3>👥 Base de Clientes</h3>
    <textarea id="data-cli" placeholder="Formato: Nombre,Dirección"></textarea>
    <button class="btn-save" onclick="guardar('cli', 'data-cli')">💾 Guardar Clientes</button>
    <button class="btn-clear" onclick="borrar('cli')">🗑️ Borrar Todos los Clientes</button>

    <hr style="margin: 20px 0;">
    <button class="btn-print" onclick="window.print()">🖨️ Generar PDF / Imprimir</button>
</div>

<script>
    // Cargar datos al abrir
    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('prod') || "";
        document.getElementById('data-cli').value = localStorage.getItem('cli') || "";
    };

    function guardar(key, textareaId) {
        const val = document.getElementById(textareaId).value;
        localStorage.setItem(key, val);
        alert("Datos guardados correctamente.");
    }

    function borrar(key) {
        if(confirm("¿Estás seguro de que quieres borrar todos los datos de " + key + "?")) {
            localStorage.removeItem(key);
            document.getElementById('data-' + key).value = "";
            alert("Borrado realizado.");
        }
    }
</script>
</body>
</html>
