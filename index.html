<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pedidos - Completo</title>
    <style>
        :root { --primary: #8b0000; }
        body { font-family: sans-serif; background: #eee; padding: 10px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .tab-btn { padding: 14px; background: #e0e0e0; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border: 1px solid #ccc; }
        button.btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-red { background: #e74c3c !important; }
        .btn-green { background: #27ae60 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" id="btn-tab-pedidos" onclick="switchTab('pedidos')">🛒 Pedidos</button>
        <button class="tab-btn" id="btn-tab-calendario" onclick="switchTab('calendario')">📅 Calendario</button>
        <button class="tab-btn" id="btn-tab-clientes" onclick="switchTab('clientes')">👥 Clientes</button>
        <button class="tab-btn" id="btn-tab-productos" onclick="switchTab('productos')">📦 Productos</button>
    </div>

    <div id="panel-pedidos" class="panel active">
        <h3>🛒 Formulario de Pedido</h3>
        <button class="btn-submit btn-green" onclick="window.print()">🖨️ Imprimir Hoja</button>
    </div>

    <div id="panel-calendario" class="panel">
        <h3>📅 Calendario de Entregas</h3>
    </div>

    <div id="panel-clientes" class="panel">
        <h3>👥 Gestión de Clientes</h3>
        <textarea id="data-cli" placeholder="Nombre,Dirección"></textarea>
        <button class="btn-submit btn-green" onclick="guardar('clientes')">💾 Guardar</button>
        <button class="btn-submit btn-red" onclick="borrar('clientes')">🗑️ BORRAR TODOS LOS CLIENTES</button>
    </div>

    <div id="panel-productos" class="panel">
        <h3>📦 Catálogo de Productos</h3>
        <textarea id="data-prod" placeholder="Nombre,Formato,Precio"></textarea>
        <button class="btn-submit btn-green" onclick="guardar('productos')">💾 Guardar</button>
        <button class="btn-submit btn-red" onclick="borrar('productos')">🗑️ BORRAR TODOS LOS PRODUCTOS</button>
    </div>
</div>

<script>
    // Tu lógica de navegación de ayer
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        document.getElementById(`btn-tab-${tabId}`).classList.add('active');
        document.getElementById(`panel-${tabId}`).classList.add('active');
    }

    // Tu lógica de guardado de ayer
    function guardar(key) {
        const id = (key === 'productos') ? 'data-prod' : 'data-cli';
        localStorage.setItem(key, document.getElementById(id).value);
        alert("Datos guardados correctamente.");
    }

    // NUEVA FUNCIÓN DE BORRADO INTEGRADA
    function borrar(key) {
        if(confirm("¿Estás SEGURO de que quieres borrar TODA la base de datos de " + key + "?")) {
            localStorage.removeItem(key);
            document.getElementById(key === 'productos' ? 'data-prod' : 'data-cli').value = "";
            alert("Borrado realizado.");
        }
    }

    // Carga inicial
    window.onload = () => {
        document.getElementById('data-prod').value = localStorage.getItem('productos') || "";
        document.getElementById('data-cli').value = localStorage.getItem('clientes') || "";
    };
</script>
</body>
</html>
